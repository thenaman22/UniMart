spring:
  datasource:
    url: jdbc:h2:mem:unimart-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  auth:
    otp-expiry-minutes: 15
  media:
    max-file-size-bytes: 26214400
    allowed-image-types: image/jpeg,image/png,image/webp
    allowed-video-types: video/mp4,video/webm
    storage-path: build/test-uploads
  seed:
    refresh-demo-data: false
